name: docker

on:
  push:
    branches: main
    tags: ["*"]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            html/.yarn/cache
            html/.yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('html/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install and Build Frontend
        working-directory: html
        run: |
          corepack enable
          yarn install
          yarn build

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake build-essential cmake curl file libtool
      - name: Cross build multi-arch binary
        run: |
          mkdir dist
          for arch in amd64 armv7 arm64 s390x; do
            env BUILD_TARGET=$arch ./scripts/cross-build.sh
            [ "$arch" = "armv7" ] && arch="arm" 
            mkdir -p dist/$arch && cp build/ttyd dist/$arch/ttyd
          done
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        if: "${{ secrets.DOCKER_HUB_USER != '' && secrets.DOCKER_HUB_TOKEN != '' }}"
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine docker tags
        id: docker_tag
        run: |
          case $GITHUB_REF in
            refs/tags/*)
              TAG_NAME=${GITHUB_REF#refs/tags/}
              SUFFIX=":${TAG_NAME}"
              ALPINE_SUFFIX=":${TAG_NAME}-alpine"
              ;;
            *)
              SUFFIX=":latest"
              ALPINE_SUFFIX=":alpine"
              ;;
          esac

          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME="${REPO_LOWER#*/}"
          
          # Initialize tag list for GHCR (always available)
          TAGS="ghcr.io/${REPO_LOWER}${SUFFIX}"
          ALPINE_TAGS="ghcr.io/${REPO_LOWER}${ALPINE_SUFFIX}"

          # Add Docker Hub tags if credentials are provided
          if [ -n "${{ secrets.DOCKER_HUB_USER }}" ] && [ -n "${{ secrets.DOCKER_HUB_TOKEN }}" ]; then
            DOCKER_HUB_REPO="${{ secrets.DOCKER_HUB_USER }}/${REPO_NAME}"
            TAGS="${TAGS}
            ${DOCKER_HUB_REPO}${SUFFIX}"
            ALPINE_TAGS="${ALPINE_TAGS}
            ${DOCKER_HUB_REPO}${ALPINE_SUFFIX}"
          fi

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "alpine_tags<<EOF" >> $GITHUB_OUTPUT
          echo "$ALPINE_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: build/push docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/s390x
          push: true
          tags: ${{ steps.docker_tag.outputs.tags }}

      - name: build/push docker image (alpine)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.alpine
          platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/s390x
          push: true
          tags: ${{ steps.docker_tag.outputs.alpine_tags }}

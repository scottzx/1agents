name: auto-release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      npm_version: ${{ steps.version.outputs.npm_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Calculate next version tag
        id: version
        run: |
          DATE_STR=$(date +'%Y%m%d')
          echo "Current date: $DATE_STR"
          
          git fetch --tags --force
          
          TAGS=$(git tag -l "v${DATE_STR}-*")
          if [ -z "$TAGS" ]; then
            NEXT_NO=1
          else
            MAX_NO=$(echo "$TAGS" | sed "s/^v${DATE_STR}-//" | sort -n | tail -n 1)
            NEXT_NO=$((MAX_NO + 1))
          fi
          
          TAG="v${DATE_STR}-${NEXT_NO}"
          NPM_VERSION="${DATE_STR}.${NEXT_NO}.0"
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          
          echo "Calculated Tag: $TAG"
          echo "Calculated NPM Version: $NPM_VERSION"

      - name: Create and push Git tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Frontend Build Assets
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: |
            html/dist
            modules/ttyd/src/html.h
          key: frontend-assets-${{ runner.os }}-${{ hashFiles('html/package.json', 'html/yarn.lock', 'html/gulpfile.js', 'html/webpack.config.js', 'html/tsconfig.json', 'html/src/**') }}

      - name: Set up Node.js
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Cache Yarn dependencies
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            html/.yarn/cache
            html/.yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('html/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install and Build Frontend
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        working-directory: html
        run: |
          corepack enable
          yarn install
          yarn build

      - name: Upload html/dist
        uses: actions/upload-artifact@v7
        with:
          name: html-dist
          path: html/dist

      - name: Upload html.h
        uses: actions/upload-artifact@v7
        with:
          name: html-header
          path: modules/ttyd/src/html.h

  # ── 1skills PyInstaller build ─────────────────────────────────────────────
  # PyInstaller embeds the CPython runtime, so the build MUST run natively on
  # each target platform/arch. Cross-compilation is not supported.
  build-1skills:
    name: build-1skills-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install build dependencies
        working-directory: modules/1skills
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ".[build]"
          npm ci

      - name: Build 1skills release artifact
        working-directory: modules/1skills
        run: python scripts/build_release.py

      - name: Upload 1skills artifact
        uses: actions/upload-artifact@v7
        with:
          name: 1skills-${{ matrix.target }}
          path: modules/1skills/.artifacts/release/*

  build-linux:
    runs-on: ${{ matrix.runner }}
    needs: [prepare, build-frontend, build-1skills]
    strategy:
      matrix:
        include:
          - arch: amd64
            target: amd64
            goarch: amd64
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            skills_target: linux-x64
          - arch: arm64
            target: arm64
            goarch: arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            skills_target: linux-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: |
            backend/go.sum
            modules/cc-connect/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download html-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: html-dist
          path: html-dist

      - name: Download html.h artifact
        uses: actions/download-artifact@v8
        with:
          name: html-header
          path: temp-html-header

      - name: Copy html.h to modules/ttyd/src/
        run: |
          if [ -f temp-html-header/modules/ttyd/src/html.h ]; then
            cp temp-html-header/modules/ttyd/src/html.h modules/ttyd/src/html.h
          elif [ -f temp-html-header/src/html.h ]; then
            cp temp-html-header/src/html.h modules/ttyd/src/html.h
          elif [ -f temp-html-header/html.h ]; then
            cp temp-html-header/html.h modules/ttyd/src/html.h
          else
            echo "html.h not found!"
            find temp-html-header -type f
            exit 1
          fi

      - name: Cache cross-compilation stage
        uses: actions/cache@v4
        with:
          path: |
            /opt/cross
            /opt/stage
          key: cross-stage-${{ matrix.target }}-${{ hashFiles('scripts/cross-build.sh') }}
          restore-keys: |
            cross-stage-${{ matrix.target }}-

      - name: Install cross-build packages
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake build-essential cmake curl file libtool

      - name: Build static ttyd
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: ./scripts/cross-build.sh

      - name: Cache cc-connect Web Assets
        id: cache-ccconnect-web
        uses: actions/cache@v4
        with:
          path: modules/cc-connect/web/dist
          key: cc-connect-web-${{ runner.os }}-${{ hashFiles('modules/cc-connect/web/package.json', 'modules/cc-connect/web/pnpm-lock.yaml', 'modules/cc-connect/web/src/**', 'modules/cc-connect/web/index.html', 'modules/cc-connect/web/vite.config.ts', 'modules/cc-connect/web/tailwind.config.ts', 'modules/cc-connect/web/postcss.config.js') }}

      - name: Cache pnpm
        if: steps.cache-ccconnect-web.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('modules/cc-connect/web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build cc-connect Web Assets
        if: steps.cache-ccconnect-web.outputs.cache-hit != 'true'
        run: |
          npm install -g pnpm
          cd modules/cc-connect/web
          pnpm install --frozen-lockfile --dangerously-allow-all-builds
          pnpm build

      - name: Build Go 1agents
        run: |
          cd backend
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${{ github.sha }} -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" -o ../build/1agents ./cmd/backend
          cd ../modules/cc-connect/cmd/cc-connect
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${{ github.sha }} -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" -o ../../../../build/cc-connect .

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ matrix.rust_target }}-${{ hashFiles('modules/cc-switch-cli/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.rust_target }}-

      - name: Build cc-switch CLI
        run: |
          cargo build \
            --manifest-path modules/cc-switch-cli/src-tauri/Cargo.toml \
            --release \
            --target ${{ matrix.rust_target }}
          mkdir -p build
          cp modules/cc-switch-cli/src-tauri/target/${{ matrix.rust_target }}/release/cc-switch build/cc-switch

      - name: Download cloudflared binary
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            curl -L -o build/cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64"
          else
            curl -L -o build/cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64"
          fi
          chmod +x build/cloudflared

      - name: Download 1skills artifact
        uses: actions/download-artifact@v8
        with:
          name: 1skills-${{ matrix.skills_target }}
          path: temp-1skills

      - name: Extract skill-manager binary
        run: |
          # The artifact is skill-manager-v{version}-{target}.tar.gz containing skill-manager/ dir
          ARCHIVE=$(find temp-1skills -name '*.tar.gz' | head -1)
          mkdir -p temp-skill-manager
          tar -xzf "$ARCHIVE" -C temp-skill-manager
          chmod +x temp-skill-manager/skill-manager/skill-manager

      - name: Package Release Archive
        run: |
          mkdir -p release-pkg/bin
          cp build/1agents release-pkg/bin/
          cp build/ttyd release-pkg/bin/
          cp build/cc-connect release-pkg/bin/
          cp build/cc-switch release-pkg/bin/
          cp build/cloudflared release-pkg/bin/
          cp temp-skill-manager/skill-manager/skill-manager release-pkg/bin/
          cp -r html-dist release-pkg/dist
          tar -czf 1agents-${{ needs.prepare.outputs.tag }}-linux-${{ matrix.arch }}.tar.gz -C release-pkg .

      - name: Upload Linux Archive
        uses: actions/upload-artifact@v7
        with:
          name: 1agents-linux-${{ matrix.arch }}
          path: 1agents-${{ needs.prepare.outputs.tag }}-linux-${{ matrix.arch }}.tar.gz

  build-macos:
    runs-on: macos-latest
    needs: [prepare, build-frontend, build-1skills]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: |
            backend/go.sum
            modules/cc-connect/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download html-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: html-dist
          path: html-dist

      - name: Download html.h artifact
        uses: actions/download-artifact@v8
        with:
          name: html-header
          path: temp-html-header

      - name: Copy html.h to modules/ttyd/src/
        run: |
          if [ -f temp-html-header/modules/ttyd/src/html.h ]; then
            cp temp-html-header/modules/ttyd/src/html.h modules/ttyd/src/html.h
          elif [ -f temp-html-header/src/html.h ]; then
            cp temp-html-header/src/html.h modules/ttyd/src/html.h
          elif [ -f temp-html-header/html.h ]; then
            cp temp-html-header/html.h modules/ttyd/src/html.h
          else
            echo "html.h not found!"
            find temp-html-header -type f
            exit 1
          fi

      - name: Install build dependencies via Homebrew
        run: brew install cmake libuv json-c openssl libwebsockets

      - name: Build ttyd natively
        run: |
          mkdir build-ttyd && cd build-ttyd
          cmake -DCMAKE_PREFIX_PATH="/opt/homebrew;/usr/local" -DCMAKE_BUILD_TYPE=Release ../modules/ttyd
          make

      - name: Cache cc-connect Web Assets
        id: cache-ccconnect-web
        uses: actions/cache@v4
        with:
          path: modules/cc-connect/web/dist
          key: cc-connect-web-${{ runner.os }}-${{ hashFiles('modules/cc-connect/web/package.json', 'modules/cc-connect/web/pnpm-lock.yaml', 'modules/cc-connect/web/src/**', 'modules/cc-connect/web/index.html', 'modules/cc-connect/web/vite.config.ts', 'modules/cc-connect/web/tailwind.config.ts', 'modules/cc-connect/web/postcss.config.js') }}

      - name: Cache pnpm
        if: steps.cache-ccconnect-web.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('modules/cc-connect/web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Build cc-connect Web Assets
        if: steps.cache-ccconnect-web.outputs.cache-hit != 'true'
        run: |
          npm install -g pnpm
          cd modules/cc-connect/web
          pnpm install --frozen-lockfile --dangerously-allow-all-builds
          pnpm build

      - name: Build Go 1agents
        run: |
          cd backend
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${{ github.sha }} -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" -o ../build-ttyd/1agents ./cmd/backend
          cd ../modules/cc-connect/cmd/cc-connect
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${{ github.sha }} -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" -o ../../../../build-ttyd/cc-connect .

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-darwin-arm64-${{ hashFiles('modules/cc-switch-cli/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-darwin-arm64-

      - name: Build cc-switch CLI
        run: |
          cargo build \
            --manifest-path modules/cc-switch-cli/src-tauri/Cargo.toml \
            --release
          cp modules/cc-switch-cli/src-tauri/target/release/cc-switch build-ttyd/cc-switch

      - name: Download cloudflared binary
        run: |
          curl -L -o build-ttyd/cloudflared "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64"
          chmod +x build-ttyd/cloudflared

      - name: Download 1skills artifact
        uses: actions/download-artifact@v8
        with:
          name: 1skills-darwin-arm64
          path: temp-1skills

      - name: Extract skill-manager binary
        run: |
          ARCHIVE=$(find temp-1skills -name '*.tar.gz' | head -1)
          mkdir -p temp-skill-manager
          tar -xzf "$ARCHIVE" -C temp-skill-manager
          chmod +x temp-skill-manager/skill-manager/skill-manager

      - name: Package Release Archive
        run: |
          mkdir -p release-pkg/bin
          cp build-ttyd/1agents release-pkg/bin/
          cp build-ttyd/ttyd release-pkg/bin/
          cp build-ttyd/cc-connect release-pkg/bin/
          cp build-ttyd/cc-switch release-pkg/bin/
          cp build-ttyd/cloudflared release-pkg/bin/
          cp temp-skill-manager/skill-manager/skill-manager release-pkg/bin/
          cp -r html-dist release-pkg/dist
          tar -czf 1agents-${{ needs.prepare.outputs.tag }}-darwin-arm64.tar.gz -C release-pkg .

      - name: Upload macOS Archive
        uses: actions/upload-artifact@v7
        with:
          name: 1agents-darwin-arm64
          path: 1agents-${{ needs.prepare.outputs.tag }}-darwin-arm64.tar.gz

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os_name: macos
            skills_target: darwin-arm64
          - platform: windows-latest
            os_name: windows
            skills_target: ''  # 1skills does not support Windows; omitted from desktop bundle
    runs-on: ${{ matrix.platform }}
    needs: [prepare, build-frontend, build-1skills]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true
          cache-dependency-path: |
            backend/go.sum
            modules/cc-connect/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download html-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: html-dist
          path: html/dist

      - name: Download html.h artifact
        uses: actions/download-artifact@v8
        with:
          name: html-header
          path: temp-html-header

      - name: Copy html.h to modules/ttyd/src/
        shell: bash
        run: |
          if [ -f temp-html-header/modules/ttyd/src/html.h ]; then
            cp temp-html-header/modules/ttyd/src/html.h modules/ttyd/src/html.h
          elif [ -f temp-html-header/src/html.h ]; then
            cp temp-html-header/src/html.h modules/ttyd/src/html.h
          elif [ -f temp-html-header/html.h ]; then
            cp temp-html-header/html.h modules/ttyd/src/html.h
          else
            echo "html.h not found!"
            find temp-html-header -type f
            exit 1
          fi

      - name: Cache cc-connect Web Assets
        id: cache-ccconnect-web
        uses: actions/cache@v4
        with:
          path: modules/cc-connect/web/dist
          key: cc-connect-web-${{ runner.os }}-${{ hashFiles('modules/cc-connect/web/package.json', 'modules/cc-connect/web/pnpm-lock.yaml', 'modules/cc-connect/web/src/**', 'modules/cc-connect/web/index.html', 'modules/cc-connect/web/vite.config.ts', 'modules/cc-connect/web/tailwind.config.ts', 'modules/cc-connect/web/postcss.config.js') }}

      - name: Build cc-connect Web Assets
        if: steps.cache-ccconnect-web.outputs.cache-hit != 'true'
        shell: bash
        run: |
          npm install -g pnpm
          cd modules/cc-connect/web
          pnpm install --frozen-lockfile --dangerously-allow-all-builds
          pnpm build

      - name: Build macOS binaries
        if: matrix.os_name == 'macos'
        run: |
          brew install cmake libuv json-c openssl libwebsockets
          mkdir build-ttyd && cd build-ttyd
          cmake -DCMAKE_PREFIX_PATH="/opt/homebrew;/usr/local" -DCMAKE_BUILD_TYPE=Release ../modules/ttyd
          make
          cd ..
          mkdir -p build
          cp build-ttyd/ttyd build/ttyd
          
          # Build Go binaries
          cd backend
          go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${{ github.sha }} -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" -o ../build/1agents ./cmd/backend
          cd ../modules/cc-connect/cmd/cc-connect
          go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${{ github.sha }} -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" -o ../../../../build/cc-connect .

      - name: Build Windows binaries
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          mkdir -p build
          # Download precompiled ttyd.exe for Windows
          curl -L -o build/ttyd.exe "https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.win32.exe"
          
          # Build Go binaries
          cd backend
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${{ github.sha }} -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" -o ../build/1agents.exe ./cmd/backend
          cd ../modules/cc-connect/cmd/cc-connect
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X main.version=${{ needs.prepare.outputs.tag }} -X main.commit=${{ github.sha }} -X main.buildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" -o ../../../../build/cc-connect.exe .

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-desktop-${{ matrix.os_name }}-${{ hashFiles('modules/cc-switch-cli/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-desktop-${{ matrix.os_name }}-

      - name: Build cc-switch CLI (macOS)
        if: matrix.os_name == 'macos'
        run: |
          cargo build \
            --manifest-path modules/cc-switch-cli/src-tauri/Cargo.toml \
            --release
          cp modules/cc-switch-cli/src-tauri/target/release/cc-switch build/cc-switch

      - name: Build cc-switch CLI (Windows)
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          cargo build \
            --manifest-path modules/cc-switch-cli/src-tauri/Cargo.toml \
            --release
          cp modules/cc-switch-cli/src-tauri/target/release/cc-switch.exe build/cc-switch.exe

      - name: Download 1skills artifact (macOS only)
        if: matrix.os_name == 'macos'
        uses: actions/download-artifact@v8
        with:
          name: 1skills-${{ matrix.skills_target }}
          path: temp-1skills

      - name: Extract skill-manager binary (macOS only)
        if: matrix.os_name == 'macos'
        run: |
          ARCHIVE=$(find temp-1skills -name '*.tar.gz' | head -1)
          mkdir -p temp-skill-manager
          tar -xzf "$ARCHIVE" -C temp-skill-manager
          chmod +x temp-skill-manager/skill-manager/skill-manager
          cp temp-skill-manager/skill-manager/skill-manager build/skill-manager

      - name: Setup Tauri resources
        shell: bash
        run: |
          ./scripts/setup-resources.sh

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri desktop application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "Release ${{ needs.prepare.outputs.tag }}"
          releaseDraft: true
          prerelease: false

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build-linux, build-macos, build-desktop]
    steps:
      - uses: actions/checkout@v6

      - name: Clean npm/bin/ before publishing
        run: |
          # Defensive cleanup: any tracked binary that escaped into npm/bin/
          # would otherwise be published on top of the platform-specific ones.
          rm -rf npm/bin
          mkdir -p npm/bin

      - name: Download all archives
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            1agents-*.tar.gz

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish to NPM
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set. Skipping NPM publishing step."
            echo "To publish automatically, add NPM_TOKEN to your repository secrets."
            exit 0
          fi

          # Extract binaries and dist into the npm packaging directory using foolproof temporary folders
          # Extract linux-amd64
          mkdir -p temp-linux-amd64
          tar -xzf 1agents-${{ needs.prepare.outputs.tag }}-linux-amd64.tar.gz -C temp-linux-amd64
          mkdir -p npm/bin/linux-amd64
          mv temp-linux-amd64/bin/* npm/bin/linux-amd64/
          rm -rf temp-linux-amd64

          # Extract linux-arm64
          mkdir -p temp-linux-arm64
          tar -xzf 1agents-${{ needs.prepare.outputs.tag }}-linux-arm64.tar.gz -C temp-linux-arm64
          mkdir -p npm/bin/linux-arm64
          mv temp-linux-arm64/bin/* npm/bin/linux-arm64/
          rm -rf temp-linux-arm64

          # Extract darwin-arm64
          mkdir -p temp-darwin-arm64
          tar -xzf 1agents-${{ needs.prepare.outputs.tag }}-darwin-arm64.tar.gz -C temp-darwin-arm64
          mkdir -p npm/bin/darwin-arm64
          mv temp-darwin-arm64/bin/* npm/bin/darwin-arm64/
          rm -rf temp-darwin-arm64

          # Extract dist (frontend assets) from linux-amd64
          mkdir -p temp-dist
          tar -xzf 1agents-${{ needs.prepare.outputs.tag }}-linux-amd64.tar.gz -C temp-dist
          mv temp-dist/dist npm/
          rm -rf temp-dist

          cd npm

          # Update the version in package.json to NPM SemVer
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.version = '${{ needs.prepare.outputs.npm_version }}';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Configure NPM auth and publish
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access public

          echo "Successfully published version ${{ needs.prepare.outputs.npm_version }} to NPM registry!"

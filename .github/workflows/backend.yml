name: backend

on:
  push:
    paths:
    - ".github/workflows/backend.yml"
    - "modules/ttyd/CMakeLists.txt"
    - "modules/ttyd/src/**"
    - "scripts/**"
  pull_request:
    paths:
    - ".github/workflows/backend.yml"
    - "modules/ttyd/CMakeLists.txt"
    - "modules/ttyd/src/**"
    - "scripts/**"
  workflow_call:

jobs:
  build-frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build Web Assets
        run: |
          cd html
          corepack enable
          yarn install
          yarn build

      - name: Upload html.h
        uses: actions/upload-artifact@v7
        with:
          name: html-header
          path: modules/ttyd/src/html.h

  msvc:
    runs-on: windows-latest
    needs: [build-frontend]
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_EXE: ${{ github.workspace }}/vcpkg/vcpkg.exe
      VCPKG_TRIPLET: x64-windows-static
      TOOLCHAIN_FILE: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
    steps:
      - uses: actions/checkout@v6
      - name: Checkout vcpkg
        uses: actions/checkout@v6
        with:
          repository: microsoft/vcpkg
          path: vcpkg
      - name: Bootstrap vcpkg
        shell: pwsh
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat
      - name: Install dependencies
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "${{ env.VCPKG_ROOT }}"
          ${{ env.VCPKG_EXE }} install --triplet ${{ env.VCPKG_TRIPLET }} libwebsockets libuv json-c zlib openssl getopt-win32

      - name: Download html.h artifact
        uses: actions/download-artifact@v8
        with:
          name: html-header
          path: temp-html-header

      - name: Copy html.h to modules/ttyd/src/
        shell: pwsh
        run: |
          if (Test-Path "temp-html-header/modules/ttyd/src/html.h") {
            Copy-Item "temp-html-header/modules/ttyd/src/html.h" "modules/ttyd/src/html.h" -Force
          } elseif (Test-Path "temp-html-header/html.h") {
            Copy-Item "temp-html-header/html.h" "modules/ttyd/src/html.h" -Force
          } else {
            Write-Host "html.h not found!"
            Get-ChildItem -Path temp-html-header -Recurse
          }

      - name: Build with MSVC
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "${{ env.VCPKG_ROOT }}"
          cmake -S modules/ttyd -B build -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}" -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TRIPLET }}
          cmake --build build --config Release
      - uses: actions/upload-artifact@v7
        with:
          name: ttyd.msvc
          path: build/Release/ttyd.exe

  cross:
    runs-on: ubuntu-24.04
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        target: [i686, x86_64, arm, armhf, aarch64, mips, mipsel, mips64, mips64el, ppc64, ppc64le, s390x, win32]
    steps:
      - uses: actions/checkout@v6
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake build-essential cmake curl file libtool

      - name: Download html.h artifact
        uses: actions/download-artifact@v8
        with:
          name: html-header
          path: temp-html-header

      - name: Copy html.h to modules/ttyd/src/
        run: |
          if [ -f temp-html-header/modules/ttyd/src/html.h ]; then
            cp temp-html-header/modules/ttyd/src/html.h modules/ttyd/src/html.h
          elif [ -f temp-html-header/html.h ]; then
            cp temp-html-header/html.h modules/ttyd/src/html.h
          else
            echo "html.h not found!"
            find temp-html-header -type f
          fi

      - name: Cross build (${{ matrix.target }})
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: ./scripts/cross-build.sh
      - uses: actions/upload-artifact@v7
        with:
          name: ttyd.${{ matrix.target }}
          path: build/ttyd*

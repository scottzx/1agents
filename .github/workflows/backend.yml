name: backend

on:
  push:
    paths:
    - ".github/workflows/backend.yml"
    - "modules/ttyd/CMakeLists.txt"
    - "modules/ttyd/src/**"
    - "scripts/**"
  pull_request:
    paths:
    - ".github/workflows/backend.yml"
    - "modules/ttyd/CMakeLists.txt"
    - "modules/ttyd/src/**"
    - "scripts/**"
  workflow_call:

jobs:
  build-frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Cache html.h
        id: cache-html-h
        uses: actions/cache@v4
        with:
          path: modules/ttyd/src/html.h
          key: html-header-${{ runner.os }}-${{ hashFiles('html/package.json', 'html/yarn.lock', 'html/gulpfile.js', 'html/webpack.config.js', 'html/tsconfig.json', 'html/src/**') }}

      - name: Set up Node.js
        if: steps.cache-html-h.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build Web Assets
        if: steps.cache-html-h.outputs.cache-hit != 'true'
        run: |
          cd html
          corepack enable
          yarn install
          yarn build

      - name: Upload html.h
        uses: actions/upload-artifact@v7
        with:
          name: html-header
          path: modules/ttyd/src/html.h

  cross:
    runs-on: ubuntu-24.04
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64, armhf, s390x]
    steps:
      - uses: actions/checkout@v6
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake build-essential cmake curl file libtool

      - name: Cache cross-compilation stage
        uses: actions/cache@v4
        with:
          path: |
            /opt/cross
            /opt/stage
          key: cross-stage-${{ matrix.target }}-${{ hashFiles('scripts/cross-build.sh') }}
          restore-keys: |
            cross-stage-${{ matrix.target }}-

      - name: Download html.h artifact
        uses: actions/download-artifact@v8
        with:
          name: html-header
          path: temp-html-header

      - name: Copy html.h to modules/ttyd/src/
        run: |
          if [ -f temp-html-header/modules/ttyd/src/html.h ]; then
            cp temp-html-header/modules/ttyd/src/html.h modules/ttyd/src/html.h
          elif [ -f temp-html-header/html.h ]; then
            cp temp-html-header/html.h modules/ttyd/src/html.h
          else
            echo "html.h not found!"
            find temp-html-header -type f
          fi

      - name: Cross build (${{ matrix.target }})
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: ./scripts/cross-build.sh
      - uses: actions/upload-artifact@v7
        with:
          name: ttyd.${{ matrix.target }}
          path: build/ttyd*

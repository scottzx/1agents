<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e">
    <link inline rel="icon" type="image/png" href="favicon.png">
    <link inline rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="./manifest.json">
    <% for (const css in htmlWebpackPlugin.files.css) { %>
    <link inline rel="stylesheet" type="text/css" href="<%= htmlWebpackPlugin.files.css[css] %>">
    <% } %>
</head>
<body>
<% for (const js in htmlWebpackPlugin.files.js) { %>
<script inline type="text/javascript" src="<%= htmlWebpackPlugin.files.js[js] %>"></script>
<% } %>
<!--
  Submodule embed bundles (custom elements). Loaded as native ESM modules
  because the embed entries are self-contained IIFE-free modules that
  register <skills-panel> and <cc-connect-panel> on import. They are
  served by the 1agents Go backend at /api/embed/* (see backend's
  server.go) and excluded from the service worker's fetch handler.
-->
<script type="module" src="/api/embed/skills-embed.js"></script>
<script type="module" src="/api/embed/cc-connect-embed.js"></script>
</body>
</html>
